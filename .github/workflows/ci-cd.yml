name: DevOps Production CI-CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image Locally
      uses: docker/build-push-action@v5
      with:
        context: .
        load: true  # This exports the image to the local Docker daemon so Trivy can see it!
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-inventory:test

    - name: Run Trivy Security Vulnerability Scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-inventory:test'
        format: 'table'
        exit-code: '0'
        severity: 'CRITICAL,HIGH'

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Push Verified Production Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-inventory:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-inventory:${{ github.sha }}
        